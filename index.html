<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Soubhik Ghosh — AI/ML Engineer</title>
    <meta
      name="description"
      content="Soubhik Ghosh — AI/ML engineer in Bengaluru. Production AI for banking: LLM agents, RAG pipelines, document intelligence, and biometric systems used by 800+ people every day."
    />
    <meta name="author" content="Soubhik Ghosh" />
    <meta name="theme-color" content="#0a0a0c" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Soubhik Ghosh — AI/ML Engineer" />
    <meta
      property="og:description"
      content="Production AI for banking — LLM agents, RAG pipelines, document intelligence, and biometric systems used by 800+ people every day."
    />
    <!--
      TODO(domain): once the production domain is known, make og:image an
      ABSOLUTE URL — most OG/Twitter scrapers ignore root-relative paths.
      A 1200x630 raster is expected at public/images/og.jpg; it does not
      exist yet, so the portrait SVG below stands in as a placeholder
      (note: many crawlers cannot render SVG). When og.jpg lands, point
      og:image (and a twitter:image) at https://<domain>/images/og.jpg.
    -->
    <meta property="og:image" content="/images/portrait.svg" />
    <meta property="og:site_name" content="Soubhik Ghosh" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Soubhik Ghosh — AI/ML Engineer" />
    <meta
      name="twitter:description"
      content="Production AI for banking — LLM agents, RAG pipelines, document intelligence, and biometric systems."
    />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  </head>
  <body>
    <!-- Mount points only. All real DOM is built by the active theme + global UI modules.
         Layering: gl-canvas 0 → theme-root 1 → ui-global 100 → transition-canvas 150 → cursor 200 → preloader 300 -->
    <canvas id="gl-canvas" aria-hidden="true"></canvas>
    <div id="theme-root" tabindex="-1"></div>
    <div id="ui-global"></div>
    <canvas id="transition-canvas" aria-hidden="true"></canvas>
    <div id="cursor" aria-hidden="true"></div>
    <div id="preloader" aria-hidden="true"></div>

    <noscript>
      <p style="font: 16px/1.6 system-ui; color: #e8e8ec; background: #0a0a0c; margin: 0; padding: 4rem 2rem; min-height: 100vh">
        This portfolio is an interactive WebGL experience and needs JavaScript.
        In the meantime: Soubhik Ghosh — AI/ML Engineer, Bengaluru. Reach me at
        <a href="mailto:99ghoshsoubhik@gmail.com" style="color: inherit">99ghoshsoubhik@gmail.com</a>
        or grab the <a href="/resume/Soubhik-Ghosh-Resume.pdf" style="color: inherit">résumé (PDF)</a>.
      </p>
    </noscript>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
